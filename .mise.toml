[tools]
uv = "latest"
python = { version = "3.13.14", venv = ".venv" }

[tasks.install]
description = "Install dependencies using uv"
run = "uv sync"

[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }

[tasks.format]
description = "Format code using Ruff"
run = "uv run ruff format ."

[tasks.ruff]
description = "Lint and fix code using Ruff"
run = "uv run ruff check . --fix"

[tasks.lint]
description = "Run Ruff lint (alias for ruff)"
alias = "ruff"

[tasks.postgres]
description = "Start postgres with docker and wait for readiness"
run = '''
docker compose up -d
until psql postgres://postgres@localhost:5435/example -c 'select 1'; do sleep 2; done
'''

[tasks.test]
description = "Run Django tests (depends on postgres)"
depends = ["postgres"]
run = '''
echo "--- 💃 Testing 💃 ---"
uv run python manage.py test
'''

[tasks."test:matrix"]
description = "Run Django tests against every supported Django/Python pair"
depends = ["postgres"]
run = '''
set -e
for pair in "4.2:3.12" "5.0:3.12" "5.1:3.13" "5.2:3.14" "6.0:3.14"; do
  django_version="${pair%%:*}"
  python_version="${pair##*:}"
  echo "--- 💃 Django ${django_version} / Python ${python_version} 💃 ---"
  uv run --python "${python_version}" --with "Django~=${django_version}.0" \
    python manage.py test tests --exclude-tag=browser
done
'''

[tasks.publish]
description = "Build and publish the package (depends on ci)"
run = '''
uv sync --frozen
uv build
uv publish
'''

[tasks.ci]
description = "Run test and lint (CI pipeline)"
depends = ["test", "lint"]